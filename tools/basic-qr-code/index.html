<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basic QR Code Generator</title>
    <link rel="stylesheet" href="/assets/tw.css" />
  </head>
  <body class="bg-gradient-to-b from-brand-50/60 to-white">
    <main class="mx-auto flex min-h-screen max-w-3xl flex-col items-center justify-center space-y-4 p-4 font-sans md:p-6">
      <div class="card mx-auto w-full max-w-lg space-y-4 text-center">
        <h1 class="text-3xl font-semibold text-gray-900">Basic QR Code Generator</h1>
        <div class="space-y-2 text-left">
          <label for="qr-text" class="font-medium text-gray-700">Text to encode</label>
          <textarea
            id="qr-text"
            class="w-full rounded-xl border bg-white p-3 text-base shadow-soft focus:border-brand-500 focus:ring-2 focus:ring-brand-500"
            placeholder="Paste a URL, text snippet, or anything you want to encode"
            autofocus
          ></textarea>
        </div>
        <div class="space-y-2 text-left">
          <label for="error-correction" class="font-medium text-gray-700">Error correction</label>
          <select id="error-correction" class="w-full rounded-xl border bg-white p-3 text-base shadow-soft focus:border-brand-500 focus:ring-2 focus:ring-brand-500">
            <option value="L">Low (7%)</option>
            <option value="M">Medium (15%)</option>
            <option value="Q">Quartile (25%)</option>
            <option value="H" selected>High (30%)</option>
          </select>
        </div>
        <div class="flex flex-wrap items-center justify-center gap-3">
          <button id="generate" class="bg-brand-600 text-white rounded-lg px-3 py-1.5 hover:bg-brand-700">Generate QR Code</button>
          <button id="download" disabled class="bg-brand-600 text-white rounded-lg px-3 py-1.5 hover:bg-brand-700 disabled:cursor-not-allowed disabled:opacity-60">Download PNG</button>
          <button id="copy" disabled class="bg-brand-600 text-white rounded-lg px-3 py-1.5 hover:bg-brand-700 disabled:cursor-not-allowed disabled:opacity-60">Copy Image</button>
        </div>
        <div id="qr-container" class="mx-auto hidden w-fit items-center justify-center rounded-xl border border-gray-900 bg-white p-4"></div>
        <footer class="text-sm text-gray-500">
          Powered by
          <a href="https://cdnjs.com/libraries/qrcodejs" target="_blank" rel="noreferrer" class="font-medium">QRCode.js</a>
          ·
          <a href="https://tools.dave.engineer" class="font-medium text-brand-700 hover:text-brand-600">&larr; Back to tools.dave.engineer</a>
        </footer>
      </div>
    </main>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" onerror="alert('Failed to load: ' + this.src)"></script>
    <script>
      const textInput = document.getElementById("qr-text");
      const errorCorrectionSelect = document.getElementById("error-correction");
      const generateButton = document.getElementById("generate");
      const downloadButton = document.getElementById("download");
      const copyButton = document.getElementById("copy");
      const qrContainer = document.getElementById("qr-container");
      const validErrorCorrectionLevels = new Set(["L", "M", "Q", "H"]);
      const qrPadding = 24;
      let qrCodeInstance = null;

      const updateUrl = (value) => {
        const url = new URL(window.location.href);
        if (value) {
          url.searchParams.set("data", value);
          url.searchParams.set("errorCorrection", errorCorrectionSelect.value);
        } else {
          url.searchParams.delete("data");
          url.searchParams.delete("errorCorrection");
        }
        window.history.replaceState({}, "", url);
      };

      const setOutputActionsState = (enabled) => {
        downloadButton.disabled = !enabled;
        copyButton.disabled = !enabled;
      };

      const addQrPadding = () => {
        const source = qrContainer.querySelector("canvas") || qrContainer.querySelector("img");
        if (!source) {
          setOutputActionsState(false);
          return;
        }

        const paddedCanvas = document.createElement("canvas");
        paddedCanvas.width = source.width + qrPadding * 2;
        paddedCanvas.height = source.height + qrPadding * 2;
        const context = paddedCanvas.getContext("2d");
        context.fillStyle = "#ffffff";
        context.fillRect(0, 0, paddedCanvas.width, paddedCanvas.height);
        context.drawImage(source, qrPadding, qrPadding);
        qrContainer.replaceChildren(paddedCanvas);
        setOutputActionsState(true);
      };

      const getQrCanvas = () => qrContainer.querySelector("canvas");

      const clearQr = () => {
        qrContainer.replaceChildren();
        copyButton.textContent = "Copy Image";
        qrContainer.classList.add("hidden");
        qrContainer.classList.remove("flex");
        qrCodeInstance = null;
        setOutputActionsState(false);
      };

      const renderQr = ({ updateHistory = true } = {}) => {
        const value = textInput.value.trim();
        clearQr();

        if (!value) {
          if (updateHistory) updateUrl("");
          return;
        }

        qrContainer.classList.remove("hidden");
        qrContainer.classList.add("flex");
        qrCodeInstance = new QRCode(qrContainer, {
          text: value,
          width: 256,
          height: 256,
          colorDark: "#111827",
          colorLight: "#ffffff",
          correctLevel: QRCode.CorrectLevel[errorCorrectionSelect.value],
        });

        if (updateHistory) updateUrl(value);
        requestAnimationFrame(addQrPadding);
      };

      const loadFromUrl = () => {
        const params = new URLSearchParams(window.location.search);
        const value = params.get("data") || "";
        const errorCorrection = (params.get("errorCorrection") || "H").toUpperCase();
        textInput.value = value;
        errorCorrectionSelect.value = validErrorCorrectionLevels.has(errorCorrection) ? errorCorrection : "H";
        renderQr({ updateHistory: false });
      };

      generateButton.addEventListener("click", () => renderQr());
      errorCorrectionSelect.addEventListener("change", () => renderQr());
      textInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && (event.metaKey || event.ctrlKey)) {
          renderQr();
        }
      });
      window.addEventListener("popstate", loadFromUrl);

      downloadButton.addEventListener("click", () => {
        const canvas = qrContainer.querySelector("canvas");
        if (!canvas) {
          setOutputActionsState(false);
          return;
        }

        const link = document.createElement("a");
        link.href = canvas.toDataURL("image/png");
        link.download = "qr-code.png";
        link.click();
      });

      copyButton.addEventListener("click", async () => {
        const canvas = getQrCanvas();
        if (!canvas) {
          setOutputActionsState(false);
          return;
        }

        try {
          const blob = await new Promise((resolve, reject) => {
            canvas.toBlob((result) => result ? resolve(result) : reject(new Error("Could not create QR image.")), "image/png");
          });
          await navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
          copyButton.textContent = "Copied!";
          window.setTimeout(() => { copyButton.textContent = "Copy Image"; }, 1500);
        } catch (error) {
          alert("Could not copy the QR image to the clipboard.");
        }
      });

      loadFromUrl();
    </script>
  </body>
</html>
